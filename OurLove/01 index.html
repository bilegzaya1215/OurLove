<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OurLove - Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="login-body">
  <div class="bg-blur bg-1"></div>
  <div class="bg-blur bg-2"></div>

  <main class="login-shell">
    <section class="login-card iphone-login-card">
      <div class="login-top">
        <div class="login-logo">♡</div>
        <h1>OurLove</h1>
        <p class="login-subtitle">
          BILEGZAYA&ENEREL
        </p>
      </div>

      <form id="loginForm" class="login-form">
        <label class="input-label" for="username">Username</label>
        <input
          id="username"
          type="text"
          placeholder="Enter username"
          autocomplete="username"
        />

        <label class="input-label" for="password">Password</label>
        <input
          id="password"
          type="password"
          placeholder="Enter password"
          autocomplete="current-password"
        />

        <button type="submit" class="primary-btn big-btn">Enter OurLove</button>
      </form>
    </section>
  </main>

  <script src="script.js"></script>
  <footer class="footer">
  © 2026 OurLove · Made with love 💙
</footer>
</body>
</html>
